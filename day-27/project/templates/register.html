<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    overflow: hidden;
    position: relative;
}

/* ===== GRID ===== */
.grid {
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: 
        linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 25s linear infinite;
    z-index: 0;
}

@keyframes gridMove {
    from { transform: translate(0,0); }
    to { transform: translate(-60px, -60px); }
}

/* ===== BLOBS ===== */
.bg {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
    animation: move 20s infinite alternate ease-in-out;
}

.bg1 {
    background: #6366f1;
    top: -100px;
    left: -100px;
}

.bg2 {
    background: #a855f7;
    bottom: -100px;
    right: -100px;
    animation-delay: 5s;
}

@keyframes move {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(100px, 80px) scale(1.2); }
}

/* ===== CANVAS ===== */
#particles {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* ===== CARD ===== */
.container {
    width: 360px;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    box-shadow: 
        0 20px 40px rgba(0,0,0,0.08),
        0 5px 10px rgba(0,0,0,0.05);
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
    position: relative;
    z-index: 2;
}

.container:hover {
    transform: translateY(-5px) scale(1.01);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #111827;
}

/* INPUTS */
.input-group {
    margin-bottom: 16px;
    position: relative;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    background: #fafafa;
    outline: none;
    transition: 0.25s;
}

input:focus {
    background: #fff;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(99,102,241,0.25);
}

/* LINK */
.link {
    margin-top: 18px;
    text-align: center;
    font-size: 14px;
}

.link a {
    color: #6366f1;
    text-decoration: none;
}

.link a:hover {
    text-decoration: underline;
}

/* MESSAGES */
.error {
    color: #dc2626;
    text-align: center;
    margin-bottom: 12px;
}

.success {
    color: #16a34a;
    text-align: center;
    margin-bottom: 12px;
}

/* TOGGLE */
.toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 12px;
    color: #6b7280;
}

/* STRENGTH */
.strength {
    height: 4px;
    border-radius: 4px;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="bg bg1"></div>
<div class="bg bg2"></div>
<canvas id="particles"></canvas>

<div class="container" id="card">
    <h2>Create Account</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <form method="POST" onsubmit="return validateForm()">
        
        <div class="input-group">
            <input type="text" id="name" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-group">
            <input type="email" id="email" name="email" placeholder="Email address" required>
        </div>

        <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="toggle" onclick="togglePassword()">Show</span>
            <div class="strength" id="strength"></div>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <div class="link">
        <p>Already have an account?</p>
        <a href="/">Login</a>
    </div>
</div>

<script>
/* 3D tilt */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    const x = (window.innerWidth / 2 - e.pageX) / 50;
    const y = (window.innerHeight / 2 - e.pageY) / 50;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* Toggle password */
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

/* Password strength */
const password = document.getElementById("password");
const strength = document.getElementById("strength");

password.addEventListener("input", () => {
    const val = password.value;
    let level = 0;

    if (val.length > 5) level++;
    if (/[A-Z]/.test(val)) level++;
    if (/[0-9]/.test(val)) level++;
    if (/[^A-Za-z0-9]/.test(val)) level++;

    const colors = ["#ef4444", "#f59e0b", "#22c55e", "#6366f1"];
    strength.style.width = (level * 25) + "%";
    strength.style.background = colors[level - 1] || "transparent";
});

/* Validation */
function validateForm() {
    const name = document.getElementById("name").value;

    if (name.length < 3) {
        alert("Enter valid name");
        return false;
    }
    return true;
}

/* ⭐ TWINKLING STARS */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 60; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5,
        opacity: Math.random(),
        speed: Math.random() * 0.02 + 0.005
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,180,255,${star.opacity})`;
        ctx.fill();

        star.opacity += star.speed;

        if (star.opacity >= 1 || star.opacity <= 0) {
            star.speed *= -1;
        }
    });

    requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
