<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    display: flex;
    height: 100vh;
    background: #ffffff;
    overflow: hidden;
    position: relative;
}

/* ===== SOFT GLOW BACKGROUND ===== */
.bg {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.25;
    animation: float 20s infinite alternate ease-in-out;
}

.bg1 { background: #6366f1; top: -120px; left: -120px; }
.bg2 { background: #a855f7; bottom: -120px; right: -120px; }

@keyframes float {
    0% { transform: translate(0,0); }
    100% { transform: translate(80px,60px); }
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 230px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding: 30px 20px;
    box-shadow: 5px 0 25px rgba(0,0,0,0.05);
    z-index: 2;
}

.sidebar h2 {
    margin-bottom: 30px;
    color: #111827;
}

.menu a {
    display: block;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: #6b7280;
    transition: 0.25s;
}

.menu a:hover {
    background: rgba(99,102,241,0.08);
    color: #6366f1;
}

/* ===== MAIN ===== */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* NAVBAR */
.navbar {
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    z-index: 2;
}

.logout {
    background: #6366f1;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.25s;
}

.logout:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(99,102,241,0.3);
}

/* CONTENT */
.content {
    padding: 30px;
    z-index: 2;
}

/* STATS */
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
}

.stat-card {
    flex: 1;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.stat-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.stat-card h3 {
    font-size: 14px;
    color: #6b7280;
}

.stat-card p {
    font-size: 22px;
    color: #6366f1;
    font-weight: 600;
}

/* MAIN CARD */
.card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.06);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
}

.card h1 {
    margin-bottom: 10px;
    color: #111827;
}

.card p {
    color: #6b7280;
    font-size: 14px;
}

/* 3D subtle tilt */
.card {
    transform-style: preserve-3d;
}
</style>
</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<!-- Sidebar -->
<div class="sidebar">
    <h2>MahakTech</h2>
    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Projects</a>
        <a href="#">Tasks</a>
        <a href="#">Profile</a>
    </div>
</div>

<!-- Main -->
<div class="main">

    <div class="navbar">
        <h3>Welcome, {{ user }}</h3>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <div class="content">

        <div class="stats">
            <div class="stat-card">
                <h3>Projects</h3>
                <p>12</p>
            </div>
            <div class="stat-card">
                <h3>Tasks</h3>
                <p>34</p>
            </div>
            <div class="stat-card">
                <h3>Messages</h3>
                <p>5</p>
            </div>
        </div>

        <div class="card" id="card">
            <h1>Dashboard Overview</h1>
            <p>You are successfully logged in. This is your aesthetic premium dashboard.</p>
        </div>

    </div>

</div>

<script>
/* Subtle 3D tilt */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    const x = (window.innerWidth / 2 - e.pageX) / 70;
    const y = (window.innerHeight / 2 - e.pageY) / 70;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
